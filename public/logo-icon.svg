<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Steamer Box Gradients -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2C14E"/>
      <stop offset="50%" stop-color="#D99A2B"/>
      <stop offset="100%" stop-color="#B27613"/>
    </linearGradient>
    <linearGradient id="steamerWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7D382"/>
      <stop offset="100%" stop-color="#D19828"/>
    </linearGradient>
    <!-- Bun Gradient -->
    <linearGradient id="bunBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7ECD8"/>
    </linearGradient>
    <!-- Shumai (Dim Sum) Gradient -->
    <linearGradient id="shumaiBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5BD"/>
      <stop offset="100%" stop-color="#F6CA44"/>
    </linearGradient>
    <!-- Cheek Gradient -->
    <radialGradient id="cheekPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F7B5A6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F7B5A6" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0E5C4A" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Forest Green Rounded Background -->
  <rect width="160" height="160" rx="40" fill="#0E5C4A" />

  <!-- Outer Bamboo Steamer Border (Gold) -->
  <circle cx="80" cy="85" r="58" fill="none" stroke="url(#goldGrad)" stroke-width="4.5" filter="url(#shadow)"/>
  
  <!-- Steamer Grid Pattern lines (Back) -->
  <g stroke="#0A4638" stroke-width="2.5" stroke-linecap="round" opacity="0.4">
    <line x1="45" y1="65" x2="115" y2="65"/>
    <line x1="30" y1="85" x2="130" y2="85"/>
    <line x1="35" y1="105" x2="125" y2="105"/>
  </g>

  <!-- Steam Wisps (Top) -->
  <g stroke="#88D1B7" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M62,36 C55,24 67,16 60,8"/>
    <path d="M80,32 C73,20 85,12 78,4"/>
    <path d="M98,36 C91,24 103,16 96,8"/>
  </g>

  <!-- Steamer Ring (Front Rim) -->
  <circle cx="80" cy="85" r="54" fill="none" stroke="url(#steamerWood)" stroke-width="3"/>

  <!-- ==================== Mascot Duo ==================== -->
  
  <!-- 1. Steamed Bun (ซาลาเปา) - Left -->
  <g>
    <!-- Bun Body -->
    <path d="M36,95 C34,74 48,58 66,58 C80,58 88,68 86,88 C84,102 76,108 66,108 C52,108 38,104 36,95 Z" fill="url(#bunBody)" stroke="#DEC59B" stroke-width="2"/>
    
    <!-- Bun Creases (Top Pleats) -->
    <g fill="none" stroke="#D1B280" stroke-width="2.5" stroke-linecap="round">
      <path d="M46,74 C52,67 58,65 64,65"/>
      <path d="M64,65 L64,58"/>
      <path d="M76,77 C72,69 68,65 64,65"/>
    </g>

    <!-- Bun Face (Cuter with shiny eyes) -->
    <!-- Rosy Cheeks -->
    <circle cx="45" cy="94" r="6" fill="url(#cheekPink)"/>
    <circle cx="75" cy="94" r="6" fill="url(#cheekPink)"/>
    <!-- Shiny Eyes -->
    <circle cx="51" cy="86" r="3.5" fill="#3A2E22"/>
    <circle cx="50" cy="84.5" r="1" fill="#FFFFFF"/>
    <circle cx="69" cy="86" r="3.5" fill="#3A2E22"/>
    <circle cx="68" cy="84.5" r="1" fill="#FFFFFF"/>
    <!-- Winking option / Happy Mouth -->
    <path d="M57,92 C60,95 62,95 65,92" fill="none" stroke="#3A2E22" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 2. Shumai (ขนมจีบ) - Right (Slightly overlapping/resting next to bun) -->
  <g>
    <!-- Shumai Body -->
    <path d="M80,98 C78,84 86,74 100,74 C112,74 120,84 118,98 C116,108 110,112 100,112 C90,112 82,108 80,98 Z" fill="url(#shumaiBody)" stroke="#E5BD60" stroke-width="2"/>
    <!-- Crab Roe/Carrot Topping -->
    <ellipse cx="100" cy="75" rx="5" ry="3" fill="#E74C3C"/>
    
    <!-- Shumai Pleat lines -->
    <g stroke="#E5BD60" stroke-width="1.8" stroke-linecap="round">
      <path d="M88,86 C90,80 92,76 94,76"/>
      <path d="M100,88 L100,77"/>
      <path d="M110,87 C108,81 106,76 104,76"/>
    </g>

    <!-- Shumai Face (Super cute little face) -->
    <!-- Rosy Cheeks -->
    <circle cx="89" cy="96" r="4.5" fill="url(#cheekPink)"/>
    <circle cx="111" cy="96" r="4.5" fill="url(#cheekPink)"/>
    <!-- Happy Curvy Eyes (^^ style) -->
    <path d="M92,86 C94,84 96,84 98,86" fill="none" stroke="#3A2E22" stroke-width="2" stroke-linecap="round"/>
    <path d="M102,86 C104,84 106,84 108,86" fill="none" stroke="#3A2E22" stroke-width="2" stroke-linecap="round"/>
    <!-- Shy/Happy Smile -->
    <path d="M98,92 C100,95 101,95 103,92" fill="none" stroke="#3A2E22" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Chopsticks held cutely at the bottom -->
  <g transform="rotate(-10 80 115)" stroke="#A0522D" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="120" x2="110" y2="120"/>
    <line x1="52" y1="124" x2="112" y2="124"/>
  </g>
</svg>
