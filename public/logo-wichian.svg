<svg width="660" height="320" viewBox="0 0 660 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F3EBDA"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A7A5E"/>
      <stop offset="1" stop-color="#0E5C4A"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F7B5A6"/>
      <stop offset="1" stop-color="#F7B5A6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0E5C4A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ===== Mascot: steamed bun character ===== -->
  <g filter="url(#soft)" transform="translate(150,150)">
    <!-- steam wisps -->
    <g stroke="#BBD9CC" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M-40,-92 q-10,-16 0,-30 q10,-14 0,-28"/>
      <path d="M0,-100 q-10,-16 0,-30 q10,-14 0,-28"/>
      <path d="M40,-92 q-10,-16 0,-30 q10,-14 0,-28"/>
    </g>

    <!-- bun body -->
    <circle cx="0" cy="0" r="96" fill="url(#bun)" stroke="#E6D9BE" stroke-width="3"/>
    <!-- pleats at top (ซาลาเปา จีบ) -->
    <g fill="none" stroke="#E0CFA8" stroke-width="3" stroke-linecap="round">
      <path d="M-66,-58 q14,-20 30,-30"/>
      <path d="M-34,-78 q10,-18 18,-26"/>
      <path d="M0,-86 l0,-22"/>
      <path d="M34,-78 q-10,-18 -18,-26"/>
      <path d="M66,-58 q-14,-20 -30,-30"/>
    </g>

    <!-- cheeks -->
    <circle cx="-52" cy="18" r="20" fill="url(#cheek)"/>
    <circle cx="52" cy="18" r="20" fill="url(#cheek)"/>

    <!-- eyes (happy) -->
    <path d="M-44,-6 q12,16 24,0" fill="none" stroke="#3A2E22" stroke-width="7" stroke-linecap="round"/>
    <path d="M20,-6 q12,16 24,0" fill="none" stroke="#3A2E22" stroke-width="7" stroke-linecap="round"/>

    <!-- smile -->
    <path d="M-22,26 q22,26 44,0" fill="none" stroke="#3A2E22" stroke-width="7" stroke-linecap="round"/>
    <!-- little tongue -->
    <path d="M-6,34 q6,12 12,0 z" fill="#E8836F"/>

    <!-- chopsticks held cute -->
    <g transform="rotate(-18)" stroke="#C77D3A" stroke-width="7" stroke-linecap="round">
      <line x1="96" y1="40" x2="150" y2="6"/>
      <line x1="98" y1="52" x2="152" y2="20"/>
    </g>
  </g>

  <!-- ===== Wordmark ===== -->
  <g transform="translate(310,118)">
    <text x="0" y="0" font-family="'Sarabun','Noto Sans Thai',sans-serif" font-size="62" font-weight="800" fill="#0E5C4A">วิเชียร</text>
    <text x="0" y="62" font-family="'Sarabun','Noto Sans Thai',sans-serif" font-size="37" font-weight="700" fill="#D99A2B">ซาลาเปา · ขนมจีบ</text>
    <!-- underline accent -->
    <rect x="2" y="80" width="232" height="6" rx="3" fill="#C0392B"/>
    <text x="0" y="112" font-family="'Sarabun','Noto Sans Thai',sans-serif" font-size="18" font-weight="600" fill="#6a756f" letter-spacing="1">นึ่งร้อนใหม่ทุกวัน · อร่อยทุกคำ</text>
  </g>
</svg>
